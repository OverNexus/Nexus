{{ define "main" }}
<section class="list-page container" aria-label="{{ .Title }}">
  <div class="list-header">
    <h1 class="section-title">{{ .Title | upper }} <span class="accent">Articles</span></h1>
    <p class="list-count">{{ len .Pages }} articles</p>
  </div>
  {{ $paginator := .Paginate .Pages }}
  <div class="article-grid">
    {{ range $paginator.Pages }}
      {{ partial "article-card.html" . }}
    {{ end }}
  </div>
  {{ template "_internal/pagination.html" . }}
</section>
{{ end }}
