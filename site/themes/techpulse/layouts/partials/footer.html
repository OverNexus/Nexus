      <span class="logo-icon">⬡</span>
      <span class="logo-text">TECH<span class="logo-accent">PULSE</span></span>
      <p>{{ .Site.Params.description }}</p>
    </div>
    <div class="footer-links">
      <h3>Categories</h3>
      <ul role="list">
        <li><a href="{{ "/categories/gaming" | relURL }}">Gaming</a></li>
        <li><a href="{{ "/categories/ar-vr" | relURL }}">AR / VR</a></li>
        <li><a href="{{ "/categories/tech" | relURL }}">Tech</a></li>
      </ul>
    </div>
    <div class="footer-copy">
      <p>© {{ now.Year }} TechPulse. Auto-generated by AI. All rights reserved.</p>
      <p class="footer-tagline">{{ .Site.Params.tagline }}</p>
    </div>
  </div>
</footer>
