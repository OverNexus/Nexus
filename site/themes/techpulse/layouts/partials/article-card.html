<article class="card" aria-label="{{ .Title }}">
  {{ if .Params.image }}
  <div class="card-img-wrap">
    <img src="{{ .Params.image }}" alt="{{ .Title }}" loading="lazy" />
    <div class="card-img-overlay" aria-hidden="true"></div>
  </div>
  {{ else }}
  <div class="card-img-wrap card-img-placeholder" aria-hidden="true">
    <div class="placeholder-grid"></div>
  </div>
  {{ end }}
  <div class="card-body">
    {{ with .Params.categories }}
    <div class="card-tags" aria-label="Categories">
      {{ range . }}<span class="tag tag-{{ . | urlize }}">{{ . }}</span>{{ end }}
    </div>
    {{ end }}
    <h3 class="card-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
    <p class="card-excerpt">{{ .Summary | truncate 120 }}</p>
    <div class="card-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
      <span class="read-time">{{ math.Round (div (countwords .Content) 200.0) }} min read</span>
    </div>
  </div>
</article>
