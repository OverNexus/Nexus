<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | truncate: 155 }}" />
  <meta name="author" content="{{ site.author }}" />
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}" />

  <!-- Open Graph -->
  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 155 }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  {% if page.image %}<meta property="og:image" content="{{ page.image }}" />{% endif %}
  {% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
  <meta property="article:author" content="{{ site.author }}" />
  {% for tag in page.tags %}<meta property="article:tag" content="{{ tag }}" />{% endfor %}
  {% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="{% if page.image %}summary_large_image{% else %}summary{% endif %}" />
  <meta name="twitter:title" content="{{ page.title | default: site.title }}" />
  <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | truncate: 155 }}" />
  {% if page.image %}<meta name="twitter:image" content="{{ page.image }}" />{% endif %}

  <!-- JSON-LD Structured Data -->
  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | default: site.description | jsonify }},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "author": { "@type": "Organization", "name": {{ site.author | jsonify }} },
    "publisher": {
      "@type": "Organization",
      "name": {{ site.title | jsonify }},
      "logo": { "@type": "ImageObject", "url": "{{ site.url }}{{ site.baseurl }}/assets/img/logo.png" }
    },
    {% if page.image %}"image": { "@type": "ImageObject", "url": {{ page.image | jsonify }} },{% endif %}
    "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ page.url | absolute_url }}" },
    "keywords": {{ page.tags | join: ', ' | jsonify }}
  }
  </script>
  {% else %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "description": {{ site.description | jsonify }},
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "{{ site.url }}{{ site.baseurl }}/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  {% endif %}

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZQZN6C7E5K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZQZN6C7E5K');
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}" />
  <link rel="alternate icon" href="{{ '/favicon.svg' | relative_url }}" />
  <meta name="theme-color" content="#8b78ff" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>
  {% include header.html %}
  <main id="main" tabindex="-1">{{ content }}</main>
  {% include footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
